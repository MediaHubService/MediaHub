<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - MediaHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body class="page-load">
  <div class="scroll-progress" id="scrollProgress"></div>
  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        </svg>
        MediaHub
      </a>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="navbar-actions">
        <a href="cart.html" class="navbar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-count" id="cartCount" style="display: none;">0</span></a>
        <div class="navbar-toggle" id="navbarToggle"><span></span><span></span><span></span></div>
      </div>
    </div>
  </nav>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div style="display: grid; grid-template-columns: 260px 1fr; gap: 32px;">
        <!-- Sidebar -->
        <aside style="background: white; padding: 32px; border-radius: 20px; height: fit-content; position: sticky; top: 100px;">
          <nav style="display: flex; flex-direction: column; gap: 8px;">
            <a href="dashboard.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>📊</span> Dashboard
            </a>
            <a href="order-history.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>📦</span> My Orders
            </a>
            <a href="profile.html" class="dashboard-link active" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--primary); background: var(--bg-gray); font-weight: 600; text-decoration: none;">
              <span>👤</span> Edit Profile
            </a>
            <a href="settings.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>⚙️</span> Settings
            </a>
            <a href="#" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>❤️</span> Favorites
            </a>
            <a href="index.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--secondary); text-decoration: none; margin-top: 16px;">
              <span>🚪</span> Logout
            </a>
          </nav>
        </aside>

        <!-- Main Content -->
        <div>
          <h1 style="margin-bottom: 32px;">Edit Profile</h1>

          <div class="card">
            <!-- Avatar Upload -->
            <div style="text-align: center; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 2px solid var(--bg-gray);">
              <div id="avatarPreview" style="width: 120px; height: 120px; border-radius: 50%; background: var(--gradient-1); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; font-weight: 700; overflow: hidden; position: relative;">
                <span id="avatarInitial">U</span>
                <img id="avatarImage" src="" alt="Profile" style="display: none; width: 100%; height: 100%; object-fit: cover;">
              </div>
              <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
              <button onclick="document.getElementById('avatarUpload').click()" class="btn btn-outline btn-sm">
                Change Avatar
              </button>
              <p style="color: var(--text-light); font-size: 0.875rem; margin-top: 8px;">JPG, PNG or GIF. Max 2MB.</p>
            </div>

            <!-- Profile Form -->
            <form id="profileForm">
              <div class="grid grid-2" style="gap: 24px; margin-bottom: 24px;">
                <div class="form-group">
                  <label class="form-label">Full Name *</label>
                  <input type="text" class="form-input" id="fullName" value="Your Name" required>
                </div>

                <div class="form-group">
                  <label class="form-label">Email Address *</label>
                  <input type="email" class="form-input" id="email" value="your@email.com" required>
                </div>

                <div class="form-group">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" class="form-input" id="phone" placeholder="+1 (555) 000-0000">
                </div>

                <div class="form-group">
                  <label class="form-label">Location</label>
                  <input type="text" class="form-input" id="location" placeholder="City, Country">
                </div>
              </div>

              <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label">Bio</label>
                <textarea class="form-input" id="bio" rows="4" placeholder="Tell us about yourself..." style="resize: vertical;"></textarea>
              </div>

              <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn btn-outline" onclick="window.location.href='dashboard.html'">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>

          <!-- Change Password -->
          <div class="card" style="margin-top: 32px;">
            <h2 style="margin-bottom: 24px;">Change Password</h2>
            <form id="passwordForm">
              <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label">Current Password *</label>
                <input type="password" class="form-input" id="currentPassword" required>
              </div>

              <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label">New Password *</label>
                <input type="password" class="form-input" id="newPassword" required>
              </div>

              <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label">Confirm New Password *</label>
                <input type="password" class="form-input" id="confirmPassword" required>
              </div>

              <div style="display: flex; justify-content: flex-end;">
                <button type="submit" class="btn btn-primary">Update Password</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer style="background: var(--bg-dark); color: white; padding: 64px 0 32px; margin-top: 96px;">
    <div class="container"><div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; text-align: center; color: rgba(255,255,255,0.5);"><p>&copy; 2026 MediaHub. All rights reserved.</p></div></div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/responsive.js"></script>
  <script>
    // Load user profile
    function loadProfile() {
      const user = localStorage.getItem('mediahub_user');
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const userData = JSON.parse(user);
      document.getElementById('fullName').value = userData.name || '';
      document.getElementById('email').value = userData.email || '';

      if (userData.picture) {
        document.getElementById('avatarImage').src = userData.picture;
        document.getElementById('avatarImage').style.display = 'block';
        document.getElementById('avatarInitial').style.display = 'none';
      } else if (userData.name) {
        document.getElementById('avatarInitial').textContent = userData.name.charAt(0).toUpperCase();
      }
    }

    // Avatar upload
    document.getElementById('avatarUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        showToast('File size must be less than 2MB', 'error');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('avatarImage').src = event.target.result;
        document.getElementById('avatarImage').style.display = 'block';
        document.getElementById('avatarInitial').style.display = 'none';
        showToast('Avatar updated!', 'success');
      };
      reader.readAsDataURL(file);
    });

    // Profile form submission
    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = JSON.parse(localStorage.getItem('mediahub_user'));
      user.name = document.getElementById('fullName').value;
      user.email = document.getElementById('email').value;
      user.phone = document.getElementById('phone').value;
      user.location = document.getElementById('location').value;
      user.bio = document.getElementById('bio').value;

      localStorage.setItem('mediahub_user', JSON.stringify(user));
      showToast('Profile updated successfully!', 'success');
    });

    // Password form submission
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        showToast('New passwords do not match', 'error');
        return;
      }

      if (newPassword.length < 8) {
        showToast('Password must be at least 8 characters', 'error');
        return;
      }

      showToast('Password updated successfully!', 'success');
      this.reset();
    });

    // Load profile on page load
    window.addEventListener('DOMContentLoaded', loadProfile);
  </script>
</body>
</html>
