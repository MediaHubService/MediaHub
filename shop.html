<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Accounts - MediaHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body class="page-load">
  <div class="scroll-progress" id="scrollProgress"></div>

  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#667eea"/>
              <stop offset="1" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
        </svg>
        MediaHub
      </a>
      
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <div class="navbar-actions">
        <a href="cart.html" class="navbar-icon" id="cartIcon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartCount" style="display: none;">0</span>
        </a>
        <a href="dashboard.html" class="navbar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <div class="navbar-toggle" id="navbarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div class="section-title">
        <h2>Browse Accounts</h2>
        <p>Find the perfect social media account for your needs</p>
      </div>

      <div style="display: grid; grid-template-columns: 280px 1fr; gap: 32px;" class="shop-layout">
        <!-- Mobile Filter Toggle -->
        <button id="mobileFilterToggle" class="btn btn-outline mobile-only" onclick="openFilterDrawer()" style="display: none; margin-bottom: 16px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
          Filters
          <span class="badge" id="activeFilterCount" style="display: none;">0</span>
        </button>

        <!-- Filter Sidebar -->
        <aside id="filterSidebar" style="background: white; padding: 24px; border-radius: 20px; height: fit-content; position: sticky; top: 100px;" class="filter-sidebar">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 style="margin: 0;">Filters</h3>
            <button class="btn btn-ghost btn-sm" id="resetFilters">Reset</button>
          </div>

          <!-- Platform Filter -->
          <div class="form-group">
            <label class="form-label">Platform</label>
            <div id="platformFilters">
              <label class="checkbox-custom">
                <input type="checkbox" value="instagram" checked>
                <span class="checkbox-box"></span>
                Instagram
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="tiktok" checked>
                <span class="checkbox-box"></span>
                TikTok
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="youtube" checked>
                <span class="checkbox-box"></span>
                YouTube
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="twitter" checked>
                <span class="checkbox-box"></span>
                Twitter/X
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="facebook" checked>
                <span class="checkbox-box"></span>
                Facebook
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="linkedin" checked>
                <span class="checkbox-box"></span>
                LinkedIn
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="twitch" checked>
                <span class="checkbox-box"></span>
                Twitch
              </label>
              <label class="checkbox-custom">
                <input type="checkbox" value="pinterest" checked>
                <span class="checkbox-box"></span>
                Pinterest
              </label>
            </div>
          </div>

          <!-- Price Range -->
          <div class="form-group">
            <label class="form-label">Price Range</label>
            <input type="range" id="priceRange" min="0" max="5000" value="5000" style="width: 100%;">
            <div style="display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-light);">
              <span>$0</span>
              <span id="priceValue">$5000</span>
            </div>
          </div>

          <!-- Followers Range -->
          <div class="form-group">
            <label class="form-label">Minimum Followers</label>
            <input type="range" id="followersRange" min="0" max="1000000" value="0" step="1000" style="width: 100%;">
            <div style="display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-light);">
              <span>0</span>
              <span id="followersValue">1M+</span>
            </div>
          </div>

          <!-- Verified Only -->
          <div class="form-group">
            <label class="checkbox-custom">
              <input type="checkbox" id="verifiedOnly">
              <span class="checkbox-box"></span>
              Verified Only
            </label>
          </div>

          <!-- Sort -->
          <div class="form-group">
            <label class="form-label">Sort By</label>
            <select class="form-select" id="sortSelect">
              <option value="newest">Newest First</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="followers">Most Followers</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>

          <button class="btn btn-primary btn-block" id="applyFilters">Apply Filters</button>
        </aside>

        <!-- Account Grid -->
        <div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <p style="margin: 0; color: var(--text-light);">Showing <strong id="showingCount">12</strong> of <strong id="totalCount">156</strong> accounts</p>
            <button class="btn btn-ghost" id="mobileFilterToggle" style="display: none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="21" x2="4" y2="14"></line>
                <line x1="4" y1="10" x2="4" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12" y2="3"></line>
                <line x1="20" y1="21" x2="20" y2="16"></line>
                <line x1="20" y1="12" x2="20" y2="3"></line>
                <line x1="1" y1="14" x2="7" y2="14"></line>
                <line x1="9" y1="8" x2="15" y2="8"></line>
                <line x1="17" y1="16" x2="23" y2="16"></line>
              </svg>
              Filters
            </button>
          </div>

          <div class="grid grid-3" id="accountsGrid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
            <!-- Accounts will be injected by JS -->
          </div>

          <!-- Pagination -->
          <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 48px;">
            <button class="btn btn-outline btn-sm" id="prevPage">Previous</button>
            <div id="paginationNumbers" style="display: flex; gap: 8px;"></div>
            <button class="btn btn-outline btn-sm" id="nextPage">Next</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer style="background: var(--bg-dark); color: white; padding: 64px 0 32px; margin-top: 96px;">
    <div class="container">
      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; text-align: center; color: rgba(255,255,255,0.5);">
        <p>&copy; 2026 MediaHub. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div class="back-to-top" id="backToTop">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/responsive.js"></script>
  <script>
    // Generate sample accounts
    const platforms = ['instagram', 'tiktok', 'youtube', 'twitter', 'facebook', 'linkedin', 'twitch', 'pinterest'];
    const platformGradients = {
      instagram: 'linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%)',
      tiktok: 'linear-gradient(135deg, #25F4EE, #FE2C55)',
      youtube: 'linear-gradient(135deg, #FF0000, #CC0000)',
      twitter: 'linear-gradient(135deg, #1DA1F2, #0D8BD9)',
      facebook: 'linear-gradient(135deg, #1877F2, #0D5DBF)',
      linkedin: 'linear-gradient(135deg, #0A66C2, #084B8A)',
      twitch: 'linear-gradient(135deg, #9146FF, #772CE8)',
      pinterest: 'linear-gradient(135deg, #E60023, #BD081C)'
    };

    const accountNames = {
      instagram: ['@travel.vibes', '@fitness.guru', '@food.lover', '@fashion.style', '@art.creative'],
      tiktok: ['@dance.king', '@comedy.fun', '@music.beats', '@viral.trends', '@challenge.pro'],
      youtube: ['Tech Reviews Pro', 'Gaming Master', 'Cooking Channel', 'Vlog Daily', 'Tutorial Hub'],
      twitter: ['@crypto.insider', '@news.daily', '@tech.updates', '@sports.live', '@meme.central'],
      facebook: ['Business Page Pro', 'Community Group', 'Brand Official', 'Event Organizer', 'Local Guide'],
      linkedin: ['CEO Network', 'Tech Professional', 'Marketing Expert', 'Startup Founder', 'Business Coach'],
      twitch: ['Gaming Streamer', 'Just Chatting', 'Music Live', 'Art Creative', 'Esports Pro'],
      pinterest: ['DIY Crafts', 'Home Decor', 'Recipe Ideas', 'Fashion Inspo', 'Travel Photos']
    };

    let allAccounts = [];
    for (let i = 0; i < 156; i++) {
      const platform = platforms[i % platforms.length];
      const names = accountNames[platform];
      const name = names[i % names.length] + (i > 4 ? ` ${Math.floor(i/5) + 1}` : '');
      const followers = Math.floor(Math.random() * 900000) + 10000;
      const price = Math.floor(Math.random() * 2000) + 99;
      const verified = Math.random() > 0.5;
      
      allAccounts.push({
        id: i,
        platform,
        name,
        followers,
        following: Math.floor(followers * 0.1),
        posts: Math.floor(Math.random() * 1000) + 50,
        price,
        originalPrice: Math.random() > 0.7 ? price + Math.floor(Math.random() * 200) : null,
        verified,
        gradient: platformGradients[platform],
        engagement: (Math.random() * 5 + 2).toFixed(1)
      });
    }

    // Render accounts function
    function renderAccounts(accounts) {
      const grid = document.getElementById('accountsGrid');
      grid.innerHTML = '';
      
      accounts.forEach((account, index) => {
        const card = document.createElement('div');
        card.className = 'account-card';
        card.style.animation = `fadeInUp 0.5s ease ${index * 0.05}s both`;
        card.innerHTML = `
          <div class="account-card-image" style="background: ${account.gradient};"></div>
          <div class="account-card-content">
            <div class="account-card-header">
              <h3 class="account-card-title">${account.name}</h3>
              <span class="platform-badge platform-${account.platform}">${account.platform}</span>
            </div>
            <div class="account-card-stats">
              <div class="stat-item">
                <div class="stat-value">${formatNumber(account.followers)}</div>
                <div class="stat-label">Followers</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${formatNumber(account.posts)}</div>
                <div class="stat-label">Posts</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${account.engagement}%</div>
                <div class="stat-label">Engagement</div>
              </div>
            </div>
            <div class="account-card-footer">
              <div>
                <span class="account-price">$${account.price}</span>
                ${account.originalPrice ? `<span class="account-price-original">$${account.originalPrice}</span>` : ''}
              </div>
              ${account.verified ? '<span class="verified-badge"></span>' : ''}
            </div>
            <div class="account-card-actions">
              <button class="btn btn-primary btn-sm btn-block add-to-cart" data-id="${account.id}" data-name="${account.name}" data-price="${account.price}" data-platform="${account.platform}">Add to Cart</button>
              <a href="account-detail.html?id=${account.id}" class="btn btn-outline btn-sm">Details</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('showingCount').textContent = accounts.length;
      document.getElementById('totalCount').textContent = allAccounts.length;
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toString();
    }

    // Initial render
    renderAccounts(allAccounts.slice(0, 12));

    // Add to cart
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('add-to-cart')) {
        const item = {
          id: e.target.dataset.id,
          name: e.target.dataset.name,
          price: parseFloat(e.target.dataset.price),
          platform: e.target.dataset.platform,
          quantity: 1
        };
        addToCart(item);
      }
    });

    // Mobile filter drawer functions
    function openFilterDrawer() {
      const sidebar = document.getElementById('filterSidebar');
      sidebar.classList.add('mobile-open');
      document.body.style.overflow = 'hidden';
    }

    function closeFilterDrawer() {
      const sidebar = document.getElementById('filterSidebar');
      sidebar.classList.remove('mobile-open');
      document.body.style.overflow = '';
    }

    function updateFilterCount() {
      const checkboxes = document.querySelectorAll('#platformFilters input[type="checkbox"]');
      const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
      const badge = document.getElementById('activeFilterCount');
      
      if (checked < 8) {
        badge.textContent = checked;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    // Update filter count on change
    document.querySelectorAll('#platformFilters input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', updateFilterCount);
    });
  </script>
</body>
</html>
