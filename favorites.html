<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Favorites - MediaHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body class="page-load">
  <div class="scroll-progress" id="scrollProgress"></div>
  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/></linearGradient></defs>
        </svg>
        MediaHub
      </a>
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="navbar-actions">
        <a href="cart.html" class="navbar-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-count" id="cartCount" style="display: none;">0</span></a>
        <div class="navbar-toggle" id="navbarToggle"><span></span><span></span><span></span></div>
      </div>
    </div>
  </nav>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div style="display: grid; grid-template-columns: 260px 1fr; gap: 32px;">
        <!-- Sidebar -->
        <aside style="background: white; padding: 32px; border-radius: 20px; height: fit-content; position: sticky; top: 100px;">
          <nav style="display: flex; flex-direction: column; gap: 8px;">
            <a href="dashboard.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>📊</span> Dashboard
            </a>
            <a href="order-history.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>📦</span> My Orders
            </a>
            <a href="profile.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>👤</span> Edit Profile
            </a>
            <a href="settings.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-dark); text-decoration: none;">
              <span>⚙️</span> Settings
            </a>
            <a href="favorites.html" class="dashboard-link active" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--primary); background: var(--bg-gray); font-weight: 600; text-decoration: none;">
              <span>❤️</span> Favorites
            </a>
            <a href="index.html" class="dashboard-link" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--secondary); text-decoration: none; margin-top: 16px;">
              <span>🚪</span> Logout
            </a>
          </nav>
        </aside>

        <!-- Main Content -->
        <div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
            <div>
              <h1>My Favorites</h1>
              <p style="color: var(--text-light); margin-top: 4px;"><span id="favoritesCount">0</span> saved accounts</p>
            </div>
            <button class="btn btn-outline btn-sm" onclick="clearAllFavorites()">Clear All</button>
          </div>

          <!-- Favorites Grid -->
          <div id="favoritesGrid" class="grid grid-3">
            <!-- Favorites will be loaded here dynamically -->
          </div>

          <!-- Empty State -->
          <div id="emptyState" class="card" style="text-align: center; padding: 64px 32px; display: none;">
            <div style="font-size: 4rem; margin-bottom: 16px;">❤️</div>
            <h2 style="margin-bottom: 8px;">No favorites yet</h2>
            <p style="color: var(--text-light); margin-bottom: 24px;">Start browsing and save accounts you love!</p>
            <a href="shop.html" class="btn btn-primary">Browse Accounts</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer style="background: var(--bg-dark); color: white; padding: 64px 0 32px; margin-top: 96px;">
    <div class="container"><div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; text-align: center; color: rgba(255,255,255,0.5);"><p>&copy; 2026 MediaHub. All rights reserved.</p></div></div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // Sample favorite accounts data
    const sampleFavorites = [
      {
        id: 1,
        name: '@travel.vibes',
        platform: 'Instagram',
        platformColor: 'linear-gradient(135deg, #f09433, #bc1888)',
        followers: '125K',
        engagement: '4.8%',
        price: 499,
        verified: true,
        image: '📸'
      },
      {
        id: 2,
        name: '@dance.king',
        platform: 'TikTok',
        platformColor: 'linear-gradient(135deg, #25F4EE, #FE2C55)',
        followers: '450K',
        engagement: '8.2%',
        price: 799,
        verified: true,
        image: '🎵'
      },
      {
        id: 3,
        name: 'Tech Reviews Pro',
        platform: 'YouTube',
        platformColor: 'linear-gradient(135deg, #FF0000, #CC0000)',
        followers: '89K',
        engagement: '6.5%',
        price: 1299,
        verified: true,
        image: '🎥'
      }
    ];

    // Load favorites
    function loadFavorites() {
      let favorites = JSON.parse(localStorage.getItem('mediahub_favorites') || '[]');
      
      // If no favorites in storage, use sample data for demo
      if (favorites.length === 0) {
        favorites = sampleFavorites;
        localStorage.setItem('mediahub_favorites', JSON.stringify(favorites));
      }

      const grid = document.getElementById('favoritesGrid');
      const emptyState = document.getElementById('emptyState');
      const count = document.getElementById('favoritesCount');

      count.textContent = favorites.length;

      if (favorites.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = favorites.map((fav, index) => `
        <div class="card account-card" style="animation: fadeInUp 0.5s ease ${index * 0.1}s both;">
          <div class="account-image" style="background: ${fav.platformColor}; display: flex; align-items: center; justify-content: center; font-size: 3rem;">
            ${fav.image}
          </div>
          <div class="account-content">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;">
              <div>
                <h3 style="margin-bottom: 4px;">${fav.name}</h3>
                <p style="color: var(--text-light); font-size: 0.875rem; margin: 0;">${fav.platform}</p>
              </div>
              ${fav.verified ? '<span style="color: var(--primary);">✓</span>' : ''}
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0;">
              <div>
                <div style="color: var(--text-light); font-size: 0.75rem;">Followers</div>
                <div style="font-weight: 700;">${fav.followers}</div>
              </div>
              <div>
                <div style="color: var(--text-light); font-size: 0.75rem;">Engagement</div>
                <div style="font-weight: 700;">${fav.engagement}</div>
              </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
              <div style="font-size: 1.5rem; font-weight: 800; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">$${fav.price}</div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-outline btn-sm" onclick="removeFavorite(${fav.id})">Remove</button>
                <button class="btn btn-primary btn-sm" onclick="addToCartFromFavorites(${fav.id})">Add to Cart</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Remove from favorites
    function removeFavorite(id) {
      let favorites = JSON.parse(localStorage.getItem('mediahub_favorites') || '[]');
      favorites = favorites.filter(fav => fav.id !== id);
      localStorage.setItem('mediahub_favorites', JSON.stringify(favorites));
      showToast('Removed from favorites', 'info');
      loadFavorites();
    }

    // Add to cart from favorites
    function addToCartFromFavorites(id) {
      const favorites = JSON.parse(localStorage.getItem('mediahub_favorites') || '[]');
      const item = favorites.find(fav => fav.id === id);
      
      if (item) {
        addToCart({
          id: item.id,
          name: item.name,
          price: item.price,
          platform: item.platform
        });
      }
    }

    // Clear all favorites
    function clearAllFavorites() {
      if (confirm('Are you sure you want to remove all favorites?')) {
        localStorage.removeItem('mediahub_favorites');
        showToast('All favorites cleared', 'success');
        loadFavorites();
      }
    }

    // Load favorites on page load
    window.addEventListener('DOMContentLoaded', loadFavorites);
  </script>
</body>
</html>
