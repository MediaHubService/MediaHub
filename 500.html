<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error - MediaHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body style="background: var(--bg-light);">
  <section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;">
    <div style="max-width: 600px; animation: fadeInUp 0.8s ease;">
      <div style="font-size: 8rem; font-weight: 900; background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 24px; animation: float 3s ease-in-out infinite;">500</div>
      <h1 style="margin-bottom: 16px;">Server Error</h1>
      <p style="color: var(--text-light); font-size: 1.125rem; margin-bottom: 32px;">Something went wrong on our end. Please try again later.</p>
      <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
        <button onclick="window.location.reload()" class="btn btn-primary btn-lg">Try Again</button>
        <a href="index.html" class="btn btn-outline btn-lg">Go Home</a>
      </div>
    </div>
  </section>
</body>
</html>
