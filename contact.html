<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MediaHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 100px 8%;
        }
        .contact-form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-gray);
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary-color);
        }
        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="light-orb orb-2"></div>
    </div>

    <nav>
        <div class="logo">Media<span>Hub</span></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="marketplace.html">Marketplace</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <div class="search-nav">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="globalSearch" placeholder="Search accounts...">
            </div>
            <div class="menu-toggle" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <main>
        <div class="contact-container">
            <div class="contact-info">
                <h1 class="animate-text">Get in Touch</h1>
                <p class="animate-text-delay">Have questions about an account or a purchase? Our support team is here to help you 24/7.</p>
                <div style="margin-top: 40px;" class="animate-text-delay">
                    <p><i class="fas fa-envelope" style="color: var(--primary-color); margin-right: 10px;"></i> support@mediahub.com</p>
                    <p><i class="fas fa-phone" style="color: var(--primary-color); margin-right: 10px;"></i> +1 (555) 123-4567</p>
                    <p><i class="fas fa-map-marker-alt" style="color: var(--primary-color); margin-right: 10px;"></i> Silicon Valley, CA</p>
                </div>
            </div>
            <div class="contact-form animate-text-delay">
                <form>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can we help you?"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 MediaHub. All rights reserved.</p>
    </footer>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="marketplace.html" class="bottom-nav-item">
            <i class="fas fa-shopping-bag"></i>
            <span>Market</span>
        </a>
        <a href="about.html" class="bottom-nav-item">
            <i class="fas fa-info-circle"></i>
            <span>About</span>
        </a>
        <a href="contact.html" class="bottom-nav-item active">
            <i class="fas fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <script src="js/three.min.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
