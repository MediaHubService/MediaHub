<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - MediaHub</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/mobile-responsive.css">
</head>
<body class="page-load">
  <div class="scroll-progress" id="scrollProgress"></div>

  <nav class="navbar" id="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="url(#gradient)"/>
          <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#667eea"/>
              <stop offset="1" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
        </svg>
        MediaHub
      </a>
      
      <ul class="navbar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>

      <div class="navbar-actions">
        <a href="cart.html" class="navbar-icon" id="cartIcon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count" id="cartCount" style="display: none;">0</span>
        </a>
        <a href="dashboard.html" class="navbar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
        <div class="navbar-toggle" id="navbarToggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <h1 style="margin-bottom: 48px;">Shopping Cart</h1>

      <div style="display: grid; grid-template-columns: 1fr 380px; gap: 48px;" class="cart-layout">
        <!-- Cart Items -->
        <div id="cartItems">
          <!-- Cart items will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyCart" style="display: none; text-align: center; padding: 64px 0;">
          <div style="font-size: 6rem; margin-bottom: 24px; animation: float 3s ease-in-out infinite;">🛒</div>
          <h2 style="margin-bottom: 16px;">Your cart is empty</h2>
          <p style="color: var(--text-light); margin-bottom: 32px;">Browse our premium accounts and find the perfect one for you</p>
          <a href="shop.html" class="btn btn-primary btn-lg">Continue Shopping</a>
        </div>

        <!-- Cart Summary -->
        <aside id="cartSummary" style="background: white; padding: 32px; border-radius: 20px; height: fit-content; position: sticky; top: 100px;">
          <h3 style="margin-bottom: 24px;">Order Summary</h3>
          
          <div style="margin-bottom: 24px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
              <span style="color: var(--text-light);">Subtotal</span>
              <span id="subtotal" style="font-weight: 600;">$0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
              <span style="color: var(--text-light);">Service Fee</span>
              <span style="font-weight: 600;">$0</span>
            </div>
            <div style="border-top: 1px solid var(--bg-gray); padding-top: 12px; margin-top: 12px;">
              <div style="display: flex; justify-content: space-between;">
                <span style="font-weight: 700; font-size: 1.25rem;">Total</span>
                <span id="total" style="font-weight: 800; font-size: 1.5rem; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">$0</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <input type="text" placeholder="Promo code" class="form-input" id="promoCode">
          </div>

          <button class="btn btn-primary btn-block btn-lg" id="checkoutBtn" style="margin-bottom: 12px;">
            Proceed to Checkout
          </button>

          <a href="shop.html" class="btn btn-outline btn-block">Continue Shopping</a>
        </aside>
      </div>

      <!-- Recommended Accounts -->
      <div style="margin-top: 96px;">
        <h2 style="text-align: center; margin-bottom: 48px;">You Might Also Like</h2>
        <div class="grid grid-4" id="recommendedAccounts">
          <!-- Will be injected by JS -->
        </div>
      </div>
    </div>
  </section>

  <footer style="background: var(--bg-dark); color: white; padding: 64px 0 32px; margin-top: 96px;">
    <div class="container">
      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px; text-align: center; color: rgba(255,255,255,0.5);">
        <p>&copy; 2026 MediaHub. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div class="back-to-top" id="backToTop">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/main.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/responsive.js"></script>
  <script>
    const platformGradients = {
      instagram: 'linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%)',
      tiktok: 'linear-gradient(135deg, #25F4EE, #FE2C55)',
      youtube: 'linear-gradient(135deg, #FF0000, #CC0000)',
      twitter: 'linear-gradient(135deg, #1DA1F2, #0D8BD9)',
      facebook: 'linear-gradient(135deg, #1877F2, #0D5DBF)',
      linkedin: 'linear-gradient(135deg, #0A66C2, #084B8A)',
      twitch: 'linear-gradient(135deg, #9146FF, #772CE8)',
      pinterest: 'linear-gradient(135deg, #E60023, #BD081C)'
    };

    // Render cart items
    function renderCart() {
      const cartItemsContainer = document.getElementById('cartItems');
      const emptyCart = document.getElementById('emptyCart');
      const cartSummary = document.getElementById('cartSummary');

      if (cart.length === 0) {
        cartItemsContainer.style.display = 'none';
        emptyCart.style.display = 'block';
        cartSummary.style.display = 'none';
        return;
      }

      cartItemsContainer.innerHTML = '';
      cartItemsContainer.style.display = 'block';
      emptyCart.style.display = 'none';
      cartSummary.style.display = 'block';

      cart.forEach((item, index) => {
        const itemElement = document.createElement('div');
        itemElement.className = 'card';
        itemElement.style.cssText = `display: flex; gap: 24px; margin-bottom: 24px; animation: slideInLeft 0.4s ease ${index * 0.1}s both;`;
        itemElement.innerHTML = `
          <div style="width: 120px; height: 120px; border-radius: 12px; background: ${platformGradients[item.platform] || platformGradients.instagram}; flex-shrink: 0;"></div>
          <div style="flex: 1;">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
              <div>
                <h3 style="margin-bottom: 4px;">${item.name}</h3>
                <span class="platform-badge platform-${item.platform}">${item.platform}</span>
              </div>
              <button class="btn btn-ghost btn-sm remove-item" data-id="${item.id}" style="color: var(--secondary);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
              </button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
              <div style="display: flex; align-items: center; gap: 12px;">
                <button class="btn btn-ghost btn-sm update-quantity" data-id="${item.id}" data-change="-1">-</button>
                <span style="font-weight: 600; min-width: 30px; text-align: center;">${item.quantity}</span>
                <button class="btn btn-ghost btn-sm update-quantity" data-id="${item.id}" data-change="1">+</button>
              </div>
              <div style="font-size: 1.5rem; font-weight: 800; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                $${item.price * item.quantity}
              </div>
            </div>
          </div>
        `;
        cartItemsContainer.appendChild(itemElement);
      });

      updateCartSummary();
    }

    // Update cart summary
    function updateCartSummary() {
      const subtotal = getCartTotal();
      document.getElementById('subtotal').textContent = `$${subtotal}`;
      document.getElementById('total').textContent = `$${subtotal}`;
    }

    // Event listeners
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('remove-item') || e.target.closest('.remove-item')) {
        const btn = e.target.classList.contains('remove-item') ? e.target : e.target.closest('.remove-item');
        removeFromCart(btn.dataset.id);
        renderCart();
      }

      if (e.target.classList.contains('update-quantity')) {
        const item = cart.find(i => i.id === e.target.dataset.id);
        if (item) {
          updateQuantity(item.id, item.quantity + parseInt(e.target.dataset.change));
          renderCart();
        }
      }
    });

    // Checkout button
    document.getElementById('checkoutBtn').addEventListener('click', function() {
      window.location.href = 'checkout.html';
    });

    // Recommended accounts
    const recommended = [
      { id: 'r1', name: '@lifestyle.blog', platform: 'instagram', price: 599, gradient: platformGradients.instagram },
      { id: 'r2', name: '@gaming.pro', platform: 'twitch', price: 899, gradient: platformGradients.twitch },
      { id: 'r3', name: 'Business Tips', platform: 'linkedin', price: 449, gradient: platformGradients.linkedin },
      { id: 'r4', name: '@viral.videos', platform: 'tiktok', price: 749, gradient: platformGradients.tiktok }
    ];

    const recommendedGrid = document.getElementById('recommendedAccounts');
    recommended.forEach(item => {
      const card = document.createElement('div');
      card.className = 'account-card';
      card.innerHTML = `
        <div class="account-card-image" style="background: ${item.gradient}; height: 150px;"></div>
        <div class="account-card-content">
          <h3 style="font-size: 1rem; margin-bottom: 8px;">${item.name}</h3>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="account-price" style="font-size: 1.25rem;">$${item.price}</span>
            <button class="btn btn-primary btn-sm add-to-cart" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-platform="${item.platform}">Add to Cart</button>
          </div>
        </div>
      `;
      recommendedGrid.appendChild(card);
    });

    // Add to cart from recommended
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('add-to-cart')) {
        const item = {
          id: e.target.dataset.id,
          name: e.target.dataset.name,
          price: parseFloat(e.target.dataset.price),
          platform: e.target.dataset.platform,
          quantity: 1
        };
        addToCart(item);
        renderCart();
      }
    });

    // Initial render
    renderCart();
  </script>
</body>
</html>
